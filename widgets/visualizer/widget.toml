[widget]
name        = "Catppuccin Visualizer"
version     = "1.0.0"
author      = "windy"
description = "Real-time audio visualizer using Web Audio API — 100% impossible in Rainmeter"
tags        = ["visualizer", "audio", "canvas", "catppuccin", "pro", "impossible"]

[window]
width              = 360
height             = 160
x                  = 60
y                  = 700
transparency       = true
hide_on_fullscreen = false

[theme]
background    = "#1e1e2e"
border        = "#313244"
border_radius = 16

[update]
interval = 60000

[data]
sources = ["media"]
