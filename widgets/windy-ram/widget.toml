[widget]
name        = "RAM Watch"
version     = "1.0.0"
author      = "windy"
description = "Memory usage and free space monitor"
tags        = ["ram", "system", "minimal"]

[window]
width              = 220
height             = 150
x                  = 120
y                  = 160
transparency       = true
hide_on_fullscreen = true

[theme]
background    = "#0f0f1490"
border        = "#ffffff10"
border_radius = 14
accent        = "#52e07c"
font_family   = "Segoe UI"
font_color    = "#ffffffcc"

[update]
interval = 1000

[data]
sources = ["ram", "clock"]

[[components]]
type           = "text"
value          = "RAM"
x              = 14
y              = 12
font_size      = 10
font_weight    = "700"
color          = "#52e07c"
letter_spacing = 2

[[components]]
type      = "text"
value     = "{{ram.usage}}%"
x         = "right-14"
y         = 12
font_size = 12
color     = "#ffffffcc"
align     = "right"

[[components]]
type             = "bar"
value            = "{{ram.usage}}"
x                = 14
y                = 34
width            = 192
height           = 6
color            = "#52e07c"
background_color = "#ffffff12"
border_radius    = 3

[[components]]
type      = "text"
value     = "{{ram.used_gb}} / {{ram.total_gb}} GB"
x         = 14
y         = 56
font_size = 12
color     = "#ffffffcc"

[[components]]
type      = "text"
value     = "{{ram.free_gb}} GB free"
x         = 14
y         = 78
font_size = 11
color     = "#ffffff70"

[[components]]
type      = "text"
value     = "{{clock.day}} · {{clock.time}}"
x         = 14
y         = 116
font_size = 10
color     = "#ffffff40"
