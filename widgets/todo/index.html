<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --base:#1e1e2e; --surface0:#313244; --surface1:#45475a;
    --overlay0:#6c7086; --text:#cdd6f4; --sub1:#bac2de;
    --mauve:#cba6f7; --green:#a6e3a1; --red:#f38ba8;
    --yellow:#f9e2af; --blue:#89b4fa; --peach:#fab387;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:280px;height:380px;background:transparent;font-family:'Inter','Segoe UI',sans-serif;color:var(--text);overflow:hidden;}
  .root{width:100%;height:100%;background:var(--base);border:1px solid var(--surface0);border-radius:16px;display:flex;flex-direction:column;}

  .header{padding:12px 14px 8px;border-bottom:1px solid var(--surface0);flex-shrink:0;}
  .hrow1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .htitle{font-size:13px;font-weight:600;color:var(--mauve);}
  .hstats{font-size:10px;color:var(--overlay0);}
  .hstats span{color:var(--green);}

  /* Filter tabs */
  .filters{display:flex;gap:3px;}
  .ftab{flex:1;padding:3px;font-size:9px;border:1px solid var(--surface1);border-radius:4px;background:none;color:var(--overlay0);cursor:pointer;transition:all .12s;font-family:inherit;text-align:center;}
  .ftab.active{background:var(--mauve);border-color:var(--mauve);color:var(--base);font-weight:600;}

  /* Input */
  .add-area{padding:8px 14px;display:flex;gap:6px;align-items:center;border-bottom:1px solid var(--surface0);flex-shrink:0;}
  .add-input{flex:1;background:var(--surface0);border:1px solid var(--surface1);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
  .add-input:focus{border-color:var(--mauve);}
  .add-input::placeholder{color:var(--overlay0);}
  .prio-sel{background:var(--surface0);border:1px solid var(--surface1);border-radius:6px;padding:5px 4px;color:var(--text);font-size:12px;cursor:pointer;outline:none;}
  .add-btn{background:var(--mauve);border:none;border-radius:6px;color:var(--base);font-size:16px;width:28px;height:28px;cursor:pointer;transition:opacity .12s;display:flex;align-items:center;justify-content:center;}
  .add-btn:hover{opacity:.8;}

  /* List */
  .list{flex:1;overflow-y:auto;padding:6px 10px;}
  .list::-webkit-scrollbar{width:3px;}
  .list::-webkit-scrollbar-thumb{background:var(--surface1);border-radius:2px;}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--overlay0);}
  .empty-state .eicon{font-size:28px;}
  .empty-state p{font-size:12px;}

  .todo-item{display:flex;align-items:flex-start;gap:8px;padding:7px 6px;border-radius:7px;transition:background .12s;margin-bottom:2px;cursor:default;}
  .todo-item:hover{background:var(--surface0);}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--overlay0);}
  .todo-item.done .prio-dot{opacity:.3;}

  .check-btn{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--surface1);background:none;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:10px;}
  .check-btn.checked{background:var(--green);border-color:var(--green);color:var(--base);}
  .check-btn:hover:not(.checked){border-color:var(--mauve);}

  .prio-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px;}
  .prio-0{background:var(--overlay0);}   /* normal */
  .prio-1{background:var(--yellow);}    /* medium */
  .prio-2{background:var(--peach);}     /* high */
  .prio-3{background:var(--red);}       /* urgent */

  .todo-body{flex:1;min-width:0;}
  .todo-text{font-size:12px;color:var(--text);line-height:1.4;word-break:break-word;}
  .todo-meta{font-size:9px;color:var(--overlay0);margin-top:2px;}

  .del-btn{background:none;border:none;color:var(--overlay0);cursor:pointer;font-size:12px;padding:1px 3px;border-radius:3px;opacity:0;transition:opacity .12s;}
  .todo-item:hover .del-btn{opacity:0.6;}
  .del-btn:hover{opacity:1!important;color:var(--red);}

  /* Footer */
  .footer{padding:6px 14px 10px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--surface0);flex-shrink:0;}
  .clear-btn{font-size:10px;color:var(--overlay0);background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:4px;transition:all .12s;}
  .clear-btn:hover{color:var(--red);background:rgba(243,139,168,.1);}
  .count{font-size:10px;color:var(--overlay0);}
  .count span{color:var(--mauve);}
</style>
</head>
<body>
<div class="root">
  <div class="header">
    <div class="hrow1">
      <span class="htitle">✓ Todo</span>
      <span class="hstats" id="statsText"><span>0</span>/0 tamamlandı</span>
    </div>
    <div class="filters">
      <button class="ftab active" onclick="setFilter('all')">Tümü</button>
      <button class="ftab"        onclick="setFilter('active')">Aktif</button>
      <button class="ftab"        onclick="setFilter('done')">Bitti</button>
      <button class="ftab"        onclick="setFilter('urgent')">🔴 Acil</button>
    </div>
  </div>

  <div class="add-area">
    <select class="prio-sel" id="prioSel" title="Öncelik">
      <option value="0">⬜</option>
      <option value="1">🟡</option>
      <option value="2">🟠</option>
      <option value="3">🔴</option>
    </select>
    <input class="add-input" id="todoInput" placeholder="Yeni görev ekle…"
      onkeydown="if(event.key==='Enter') addTodo()" />
    <button class="add-btn" onclick="addTodo()">+</button>
  </div>

  <div class="list" id="list"></div>

  <div class="footer">
    <button class="clear-btn" onclick="clearDone()">Bitenleri Temizle</button>
    <span class="count" id="countText"><span>0</span> görev kaldı</span>
  </div>
</div>

<script>
(function() {
  let todos  = [];
  let filter = 'all';
  let windy;

  const PRIO_COLORS = ['#6c7086','#f9e2af','#fab387','#f38ba8'];

  async function load() {
    if (!windy) return;
    const v = await windy.storage.get('cat_todos').catch(()=>null);
    if (v) todos = v;
    else todos = [
      { id:1, text:'Windy widgetları dene', done:false, prio:2, date:'Bugün' },
      { id:2, text:'Catppuccin temasını incele', done:false, prio:1, date:'Bugün' },
      { id:3, text:'Pomodoro zamanlayıcıyı başlat', done:false, prio:0, date:'Bugün' },
    ];
    render();
  }

  async function save() {
    if (!windy) return;
    await windy.storage.set('cat_todos', todos).catch(()=>{});
  }

  function getFiltered() {
    switch(filter) {
      case 'active': return todos.filter(t=>!t.done);
      case 'done':   return todos.filter(t=>t.done);
      case 'urgent': return todos.filter(t=>t.prio===3&&!t.done);
      default:       return todos;
    }
  }

  function render() {
    const list  = document.getElementById('list');
    const items = getFiltered().sort((a,b)=>b.prio-a.prio);
    const done  = todos.filter(t=>t.done).length;
    const total = todos.length;
    const remaining = todos.filter(t=>!t.done).length;

    document.getElementById('statsText').innerHTML = `<span>${done}</span>/${total} tamamlandı`;
    document.getElementById('countText').innerHTML  = `<span>${remaining}</span> görev kaldı`;

    if (items.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="eicon">🎉</div><p>${
        filter==='all' ? 'Henüz görev yok' :
        filter==='done'? 'Tamamlanan yok' :
        filter==='urgent'? 'Acil görev yok' : 'Tümü tamamlandı!'
      }</p></div>`;
      return;
    }

    list.innerHTML = '';
    items.forEach(todo => {
      const div = document.createElement('div');
      div.className = 'todo-item' + (todo.done?' done':'');
      div.innerHTML = `
        <button class="check-btn ${todo.done?'checked':''}"
          onclick="toggle(${todo.id})">${todo.done?'✓':''}</button>
        <div class="prio-dot prio-${todo.prio}"
          style="background:${PRIO_COLORS[todo.prio]}"></div>
        <div class="todo-body">
          <div class="todo-text">${escHtml(todo.text)}</div>
          ${todo.date?`<div class="todo-meta">${todo.date}</div>`:''}
        </div>
        <button class="del-btn" onclick="remove(${todo.id})">✕</button>
      `;
      list.appendChild(div);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  window.addTodo = function() {
    const input = document.getElementById('todoInput');
    const text  = input.value.trim();
    if (!text) return;
    const prio = parseInt(document.getElementById('prioSel').value);
    const now  = new Date();
    const date = now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
    todos.unshift({ id:Date.now(), text, done:false, prio, date });
    input.value = '';
    save(); render();
  };

  window.toggle = function(id) {
    const t = todos.find(x=>x.id===id);
    if (t) t.done = !t.done;
    save(); render();
  };

  window.remove = function(id) {
    todos = todos.filter(x=>x.id!==id);
    save(); render();
  };

  window.clearDone = function() {
    todos = todos.filter(t=>!t.done);
    save(); render();
  };

  window.setFilter = function(f) {
    filter = f;
    document.querySelectorAll('.ftab').forEach((el,i)=>{
      el.className = 'ftab' + (['all','active','done','urgent'][i]===f?' active':'');
    });
    render();
  };

  async function init() {
    windy = window.__windy__;
    await load();
  }

  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
  else init();
})();
</script>
</body>
</html>
