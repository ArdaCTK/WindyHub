[widget]
name        = "YouTube Player"
version     = "1.0.0"
author      = "windy"
description = "Paste a YouTube link and play it inside the widget with full media controls"
preview     = "preview.png"
tags        = ["media", "youtube", "video", "pro"]

[window]
width              = 420
height             = 320
x                  = 240
y                  = 220
transparency       = false
hide_on_fullscreen = true
always_on_top      = false

[theme]
background    = "#0e1116"
border        = "#222a35"
border_radius = 14
accent        = "#ff3b30"
font_family   = "Segoe UI"
font_color    = "#e8edf5"

[update]
interval = 1000

[data]
sources = []
