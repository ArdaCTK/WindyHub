[widget]
name        = "System Badge"
version     = "1.0.0"
author      = "windy"
description = "System identity card with uptime and battery state"
tags        = ["system", "sysinfo", "battery", "minimal"]

[window]
width              = 250
height             = 145
x                  = 220
y                  = 560
transparency       = true
hide_on_fullscreen = true

[theme]
background    = "#10131890"
border        = "#ffffff10"
border_radius = 14
accent        = "#58d68d"
font_family   = "Segoe UI"
font_color    = "#ffffffcc"

[update]
interval = 2000

[data]
sources = ["sysinfo", "battery", "clock"]

[[components]]
type      = "text"
value     = "SYSTEM BADGE"
x         = 14
y         = 12
font_size = 9
font_weight = "700"
color     = "#58d68d"
letter_spacing = 2

[[components]]
type      = "text"
value     = "{{sysinfo.hostname}}"
x         = 14
y         = 32
font_size = 13
font_weight = "600"
color     = "#ffffffdd"

[[components]]
type      = "text"
value     = "User: {{sysinfo.username}}"
x         = 14
y         = 52
font_size = 10
color     = "#ffffff95"

[[components]]
type      = "text"
value     = "Uptime: {{sysinfo.uptime}}"
x         = 14
y         = 68
font_size = 10
color     = "#ffffff85"

[[components]]
type             = "bar"
value            = "{{battery.level}}"
min              = 0
max              = 100
x                = 14
y                = 90
width            = 222
height           = 6
color            = "#58d68d"
background_color = "#ffffff14"
border_radius    = 3

[[components]]
type      = "text"
value     = "Battery {{battery.level}}%"
x         = 14
y         = 106
font_size = 10
color     = "#ffffffb0"

[[components]]
type      = "text"
value     = "{{clock.date_short}} · {{clock.time}}"
x         = "right-14"
y         = 124
font_size = 9
color     = "#ffffff45"
align     = "right"
