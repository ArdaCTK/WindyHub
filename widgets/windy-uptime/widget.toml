[widget]
name        = "Uptime Card"
version     = "1.0.0"
author      = "windy"
description = "Hostname, user and uptime summary"
tags        = ["sysinfo", "uptime", "minimal"]

[window]
width              = 140
height             = 150
x                  = 160
y                  = 220
transparency       = true
hide_on_fullscreen = true

[theme]
background    = "#0f0f1490"
border        = "#ffffff10"
border_radius = 14
accent        = "#4ecdc4"
font_family   = "Segoe UI"
font_color    = "#ffffffcc"

[update]
interval = 1000

[data]
sources = ["sysinfo", "clock"]

[[components]]
type           = "text"
value          = "SYSTEM"
x              = 16
y              = 14
font_size      = 9
font_weight    = "700"
color          = "#4ecdc4"
letter_spacing = 2

[[components]]
type      = "text"
value     = "{{sys.hostname}}"
x         = 16
y         = 32
font_size = 13
font_weight = "600"
color     = "#ffffffd0"

[[components]]
type      = "text"
value     = "User: {{sys.username}}"
x         = 16
y         = 54
font_size = 10
color     = "#ffffff85"

[[components]]
type      = "text"
value     = "Uptime: {{sys.uptime}}"
x         = 16
y         = 72
font_size = 10
color     = "#ffffff95"

[[components]]
type      = "text"
value     = "{{clock.date_short}} · {{clock.time}}"
x         = 16
y         = 96
font_size = 10
color     = "#ffffff45"
