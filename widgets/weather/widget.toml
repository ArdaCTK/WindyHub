[widget]
name        = "Catppuccin Weather Pro"
version     = "1.0.0"
author      = "windy"
description = "7-day forecast with Open-Meteo API + Chart.js graph — Impossible in Rainmeter"
tags        = ["weather", "forecast", "chart", "catppuccin", "pro"]

[window]
width              = 340
height             = 320
x                  = 60
y                  = 60
transparency       = true
hide_on_fullscreen = false

[theme]
background    = "#1e1e2e"
border        = "#313244"
border_radius = 16

[update]
interval = 1800000

[data]
sources = ["clock", "sysinfo"]
