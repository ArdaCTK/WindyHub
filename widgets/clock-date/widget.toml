[widget]
name        = "Catppuccin Clock"
version     = "1.0.0"
author      = "windy"
description = "Elegant clock and date indicator"
tags        = ["clock", "date", "catppuccin"]

[window]
width              = 220
height             = 180
x                  = 320
y                  = 500
transparency       = true
hide_on_fullscreen = false

[theme]
background    = "#1e1e2e95"
border        = "#31324470"
border_radius = 18
accent        = "#b4befe"
font_family   = "Segoe UI"
font_color    = "#cdd6f4"

[update]
interval = 1000

[data]
sources = ["clock"]

# Arka plan şekil
[[components]]
type          = "shape"
shape         = "rectangle"
x             = 0
y             = 0
color         = "transparent"

# Analog saat
[[components]]
type         = "clock"
x            = 60
y            = 12
size         = 100
color        = "#b4befe40"
face_color   = "#b4befe08"
hand_color   = "#cdd6f4cc"
show_seconds = true

# Saat (dijital)
[[components]]
type        = "text"
value       = "{{clock.time}}"
x           = 110
y           = 122
font_size   = 28
font_weight = "300"
color       = "#cdd6f4"
align       = "center"

# Saniye
[[components]]
type      = "text"
value     = ":{{clock.time_seconds}}"
x         = "right-16"
y         = 128
font_size = 11
color     = "#b4befe60"
align     = "right"

# Gün adı
[[components]]
type           = "text"
value          = "{{clock.day}}"
x              = 110
y              = 154
font_size      = 11
font_weight    = "500"
color          = "#b4befe"
align          = "center"
letter_spacing = 1

# Tarih
[[components]]
type      = "text"
value     = "{{clock.date_short}}"
x         = 110
y         = 168
font_size = 10
color     = "#6c7086"
align     = "center"
