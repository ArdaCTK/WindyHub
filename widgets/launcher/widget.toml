[widget]
name        = "Catppuccin Launcher"
version     = "1.0.0"
author      = "windy"
description = "App and website shortcuts — editable, draggable"
tags        = ["launcher", "apps", "catppuccin", "pro"]

[window]
width              = 280
height             = 360
x                  = 400
y                  = 60
transparency       = true
hide_on_fullscreen = false

[theme]
background    = "#1e1e2e"
border        = "#313244"
border_radius = 16

[update]
interval = 60000

[data]
sources = ["clock"]
