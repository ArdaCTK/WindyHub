[widget]
name        = "Catppuccin Lyrics"
version     = "1.0.0"
author      = "windy"
description = "Synchronized lyrics with LRCLib API — only possible in Windy"
tags        = ["lyrics", "media", "catppuccin", "pro"]

[window]
width              = 320
height             = 420
x                  = 60
y                  = 60
transparency       = true
hide_on_fullscreen = false

[theme]
background    = "#1e1e2e"
border        = "#313244"
border_radius = 16

[update]
interval = 1000

[data]
sources = ["media"]
