[widget]
name        = "Catppuccin Media"
version     = "1.0.0"
author      = "windy"
description = "Now Playing — album cover, progress bar, controls"
tags        = ["media", "music", "catppuccin", "pro"]

[window]
width              = 300
height             = 130
x                  = 700
y                  = 60
transparency       = true
hide_on_fullscreen = false

[theme]
background    = "#1e1e2e"
border        = "#313244"
border_radius = 16

[update]
interval = 1000

[data]
sources = ["media", "audio"]
