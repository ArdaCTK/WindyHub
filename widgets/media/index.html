<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --base:#1e1e2e; --surface0:#313244; --surface1:#45475a;
    --overlay0:#6c7086; --text:#cdd6f4; --sub1:#bac2de;
    --mauve:#cba6f7; --blue:#89b4fa; --green:#a6e3a1;
    --red:#f38ba8; --yellow:#f9e2af; --teal:#94e2d5;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html,body {
    width:300px; height:130px;
    background:transparent;
    font-family:'Inter','Segoe UI',sans-serif;
    overflow:hidden;
  }

  .root {
    width:100%; height:100%;
    background:var(--base);
    border:1px solid var(--surface0);
    border-radius:16px;
    display:flex; flex-direction:column;
    padding:14px;
    position:relative;
    overflow:hidden;
  }

  /* Arka plan blur efekti */
  .bg-blur {
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    filter:blur(20px) brightness(0.3);
    transform:scale(1.2);
    z-index:0; opacity:0;
    transition:opacity .6s;
  }

  .bg-blur.show { opacity:1; }

  .content { position:relative; z-index:1; display:flex; flex-direction:column; gap:0; }

  /* Row 1: art + info */
  .row1 {
    display:flex; align-items:center; gap:12px;
  }

  .art {
    width:52px; height:52px;
    border-radius:8px;
    background:var(--surface0);
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    flex-shrink:0;
    overflow:hidden;
    box-shadow:0 4px 12px #0004;
  }

  .art img { width:100%; height:100%; object-fit:cover; }

  .info { flex:1; min-width:0; }

  .song {
    font-size:13px; font-weight:600;
    color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .artist {
    font-size:11px; color:var(--sub1); margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* Controls */
  .controls {
    display:flex; align-items:center; justify-content:center;
    gap:12px; margin-top:8px;
  }

  .ctrl-btn {
    background:none; border:none;
    color:var(--sub1); cursor:pointer;
    font-size:14px; padding:4px;
    border-radius:50%;
    transition:color .15s, transform .12s;
    display:flex; align-items:center; justify-content:center;
  }

  .ctrl-btn:hover { color:var(--mauve); transform:scale(1.15); }

  .ctrl-btn.play {
    width:32px; height:32px;
    background:var(--mauve);
    color:var(--base);
    font-size:13px;
  }

  .ctrl-btn.play:hover { background:var(--blue); transform:scale(1.1); }

  /* Progress */
  .progress-area {
    display:flex; align-items:center; gap:6px;
    margin-top:8px;
  }

  .time { font-size:9px; color:var(--overlay0); font-variant-numeric:tabular-nums; flex-shrink:0; }

  .prog-track {
    flex:1; height:3px;
    background:var(--surface1); border-radius:2px;
    overflow:hidden; cursor:pointer;
  }

  .prog-fill {
    height:100%; background:var(--mauve);
    border-radius:2px; width:0%;
    transition:width 1s linear;
  }

  /* Volume */
  .volume-area {
    display:flex; align-items:center; gap:6px;
    margin-top:6px;
  }

  .vol-icon { font-size:11px; color:var(--overlay0); }

  .vol-track {
    flex:1; height:3px;
    background:var(--surface1); border-radius:2px;
    overflow:hidden;
  }

  .vol-fill {
    height:100%; background:var(--teal);
    border-radius:2px; transition:width .3s;
  }

  .idle-msg {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:6px; color:var(--overlay0); font-size:12px; z-index:2;
  }

  .idle-msg.hidden { display:none; }

  svg { width:1em; height:1em; fill:currentColor; }
</style>
</head>
<body>
<div class="root">
  <div class="bg-blur" id="bgBlur"></div>

  <div class="idle-msg" id="idleMsg">
    <span style="font-size:24px;">🎵</span>
    <span>Müzik çalmıyor</span>
  </div>

  <div class="content" id="content" style="display:none">
    <div class="row1">
      <div class="art" id="art">♪</div>
      <div class="info">
        <div class="song" id="song">—</div>
        <div class="artist" id="artist">—</div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="prev()" title="Önceki">
        ⏮
      </button>
      <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="next()" title="Sonraki">⏭</button>
    </div>

    <div class="progress-area">
      <span class="time" id="timePos">0:00</span>
      <div class="prog-track" id="progTrack">
        <div class="prog-fill" id="progFill"></div>
      </div>
      <span class="time" id="timeDur">0:00</span>
    </div>

    <div class="volume-area">
      <span class="vol-icon">🔊</span>
      <div class="vol-track">
        <div class="vol-fill" id="volFill" style="width:75%"></div>
      </div>
      <span class="time" id="volVal">75</span>
    </div>
  </div>
</div>

<script>
(function() {
  let playing = false;
  let windy;

  function fmt(secs) {
    const s = Math.floor(secs);
    const m = Math.floor(s/60);
    return m + ':' + String(s%60).padStart(2,'0');
  }

  function show(hasMedia) {
    document.getElementById('idleMsg').className = hasMedia ? 'idle-msg hidden' : 'idle-msg';
    document.getElementById('content').style.display = hasMedia ? 'flex' : 'none';
  }

  function updateMedia(media) {
    if (!media || !media.title) { show(false); return; }
    show(true);

    document.getElementById('song').textContent   = media.title  || '—';
    document.getElementById('artist').textContent = media.artist || '—';

    playing = media.playing;
    document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';

    if (media.duration_secs > 0) {
      const pct = (media.position_secs / media.duration_secs) * 100;
      document.getElementById('progFill').style.width = pct.toFixed(2) + '%';
      document.getElementById('timePos').textContent  = fmt(media.position_secs);
      document.getElementById('timeDur').textContent  = fmt(media.duration_secs);
    }

    // Album art
    const art = document.getElementById('art');
    if (media.thumbnail) {
      art.innerHTML = `<img src="data:image/png;base64,${media.thumbnail}" />`;
      document.getElementById('bgBlur').style.backgroundImage = `url("data:image/png;base64,${media.thumbnail}")`;
      document.getElementById('bgBlur').className = 'bg-blur show';
    } else {
      art.innerHTML = '♪';
      document.getElementById('bgBlur').className = 'bg-blur';
    }
  }

  function updateAudio(audio) {
    if (!audio) return;
    document.getElementById('volFill').style.width = audio.volume + '%';
    document.getElementById('volVal').textContent  = Math.round(audio.volume);
  }

  window.togglePlay = function() {
    if (!windy) return;
    if (playing) { windy.media.pause(); playing = false; }
    else         { windy.media.play();  playing = true;  }
    document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
  };

  window.prev = function() { windy?.media.previous(); };
  window.next = function() { windy?.media.next(); };

  function init() {
    windy = window.__windy__;
    if (!windy) { setTimeout(init, 30); return; }

    windy.data.subscribe('media', updateMedia);
    windy.data.subscribe('audio', updateAudio);
    windy.data.get('media').then(updateMedia).catch(() => {});
    windy.data.get('audio').then(updateAudio).catch(() => {});
  }

  init();
})();
</script>
</body>
</html>
